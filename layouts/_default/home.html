<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">

  {{ partial "header.html" . }}

  <body>

    {{ partial "navbar.html" . }}

    {{ partial "carousel.html" . }}

    {{ .Content }}


<section class="gallery-area section-gap" id="trailers">
<div class="container">
<div class="highlight">
<div class="gal">
{{ range .Sections }}
{{ range .Sections }}
{{ if isset .Params "trailer" }}

    <span style="position: relative;text-align: center">
      <div style="color: white; background-color: #00000088; font-size: 120%; font-weight: 700; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width:100%; height: 300%;">{{ .Title | markdownify }}</div>
      <a href="{{ .URL }}"><img src={{ .Params.Trailer | relURL }}></a>
    </span>

{{ end }}
{{ end }}
{{ end }}
</div></div></div>
</section>


    {{ partial "footer.html" . }}

  </body>
</html>
